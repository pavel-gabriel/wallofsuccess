name: Deploy Supabase functions

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - claude/wall-of-fame-testimonials-88i7c2
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-functions.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      # verify_jwt = false is declared per-function in supabase/config.toml,
      # so the CLI applies it automatically — no --no-verify-jwt flag needed.
      - name: Deploy request-testimonial
        run: supabase functions deploy request-testimonial

      - name: Deploy submit-testimonial
        run: supabase functions deploy submit-testimonial
