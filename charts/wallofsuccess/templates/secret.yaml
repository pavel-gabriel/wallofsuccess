{{- if not .Values.app.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wallofsuccess.secretName" . }}
  labels:
    {{- include "wallofsuccess.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "wallofsuccess.databaseUrl" . | quote }}
  JWT_SECRET: {{ .Values.app.jwtSecret | quote }}
  ADMIN_EMAIL: {{ .Values.app.adminEmail | quote }}
  ADMIN_PASSWORD: {{ .Values.app.adminPassword | quote }}
  REQUEST_API_KEY: {{ .Values.app.requestApiKey | quote }}
  PUBLIC_SITE_URL: {{ .Values.app.publicSiteUrl | quote }}
  TOKEN_TTL_DAYS: {{ .Values.app.tokenTtlDays | quote }}
  SMTP_HOST: {{ .Values.app.smtp.host | quote }}
  SMTP_PORT: {{ .Values.app.smtp.port | quote }}
  SMTP_SECURE: {{ .Values.app.smtp.secure | quote }}
  SMTP_USER: {{ .Values.app.smtp.user | quote }}
  SMTP_PASS: {{ .Values.app.smtp.password | quote }}
  MAIL_FROM: {{ .Values.app.smtp.from | quote }}
  STORAGE_DRIVER: {{ .Values.storage.driver | quote }}
  {{- if eq .Values.storage.driver "s3" }}
  S3_BUCKET: {{ .Values.storage.s3.bucket | quote }}
  S3_REGION: {{ .Values.storage.s3.region | quote }}
  S3_ENDPOINT: {{ .Values.storage.s3.endpoint | quote }}
  S3_FORCE_PATH_STYLE: {{ .Values.storage.s3.forcePathStyle | quote }}
  S3_PREFIX: {{ .Values.storage.s3.prefix | quote }}
  S3_PUBLIC_BASE_URL: {{ .Values.storage.s3.publicBaseUrl | quote }}
  S3_ACL: {{ .Values.storage.s3.acl | quote }}
  S3_ACCESS_KEY_ID: {{ .Values.storage.s3.accessKeyId | quote }}
  S3_SECRET_ACCESS_KEY: {{ .Values.storage.s3.secretAccessKey | quote }}
  {{- else if eq .Values.storage.driver "azure" }}
  AZURE_STORAGE_CONNECTION_STRING: {{ .Values.storage.azure.connectionString | quote }}
  AZURE_STORAGE_ACCOUNT: {{ .Values.storage.azure.account | quote }}
  AZURE_STORAGE_ACCOUNT_KEY: {{ .Values.storage.azure.accountKey | quote }}
  AZURE_STORAGE_CONTAINER: {{ .Values.storage.azure.container | quote }}
  AZURE_PUBLIC_BASE_URL: {{ .Values.storage.azure.publicBaseUrl | quote }}
  {{- end }}
  {{- if .Values.postgres.enabled }}
  POSTGRES_USER: {{ .Values.postgres.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
  {{- end }}
{{- end }}
