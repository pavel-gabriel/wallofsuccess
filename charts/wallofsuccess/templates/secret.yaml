{{- if not .Values.app.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wallofsuccess.secretName" . }}
  labels:
    {{- include "wallofsuccess.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "wallofsuccess.databaseUrl" . | quote }}
  JWT_SECRET: {{ .Values.app.jwtSecret | quote }}
  ADMIN_EMAIL: {{ .Values.app.adminEmail | quote }}
  ADMIN_PASSWORD: {{ .Values.app.adminPassword | quote }}
  REQUEST_API_KEY: {{ .Values.app.requestApiKey | quote }}
  PUBLIC_SITE_URL: {{ .Values.app.publicSiteUrl | quote }}
  TOKEN_TTL_DAYS: {{ .Values.app.tokenTtlDays | quote }}
  SMTP_HOST: {{ .Values.app.smtp.host | quote }}
  SMTP_PORT: {{ .Values.app.smtp.port | quote }}
  SMTP_SECURE: {{ .Values.app.smtp.secure | quote }}
  SMTP_USER: {{ .Values.app.smtp.user | quote }}
  SMTP_PASS: {{ .Values.app.smtp.password | quote }}
  MAIL_FROM: {{ .Values.app.smtp.from | quote }}
  {{- if .Values.postgres.enabled }}
  POSTGRES_USER: {{ .Values.postgres.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
  {{- end }}
{{- end }}
