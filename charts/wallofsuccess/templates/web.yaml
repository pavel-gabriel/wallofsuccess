{{- $fullname := include "wallofsuccess.fullname" . }}
{{- if .Values.web.uploads.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $fullname }}-uploads
  labels:
    {{- include "wallofsuccess.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  accessModes:
    - {{ .Values.web.uploads.accessMode }}
  resources:
    requests:
      storage: {{ .Values.web.uploads.size }}
  {{- if .Values.web.uploads.storageClass }}
  storageClassName: {{ .Values.web.uploads.storageClass }}
  {{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-web
  labels:
    {{- include "wallofsuccess.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "wallofsuccess.labels" . | nindent 8 }}
        app.kubernetes.io/component: web
        {{- with .Values.serviceAccount.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if or .Values.serviceAccount.create .Values.serviceAccount.name }}
      serviceAccountName: {{ default (printf "%s-web" (include "wallofsuccess.fullname" .)) .Values.serviceAccount.name }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Init container applies the schema and seeds the admin before the app
      # starts (this gives the web pod its two containers: init + server).
      initContainers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "src/migrate.js"]
          envFrom:
            - secretRef:
                name: {{ include "wallofsuccess.secretName" . }}
      containers:
        - name: server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: {{ include "wallofsuccess.secretName" . }}
          env:
            - name: PORT
              value: "8080"
            - name: FRONTEND_DIR
              value: /app/dist
            - name: UPLOADS_DIR
              value: /data/uploads
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          volumeMounts:
            - name: uploads
              mountPath: /data
      volumes:
        - name: uploads
        {{- if .Values.web.uploads.enabled }}
          persistentVolumeClaim:
            claimName: {{ $fullname }}-uploads
        {{- else }}
          emptyDir: {}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-web
  labels:
    {{- include "wallofsuccess.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: {{ .Values.web.service.type }}
  ports:
    - port: {{ .Values.web.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: web
