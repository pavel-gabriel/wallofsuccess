# Default values for the Wall of Fame chart.

nameOverride: ""
fullnameOverride: ""

image:
  # The web image built from the repo Dockerfile (frontend + API server).
  repository: ghcr.io/pavel-gabriel/wallofsuccess
  tag: latest
  pullPolicy: IfNotPresent
imagePullSecrets: []

web:
  replicaCount: 1 # local uploads use a ReadWriteOnce PVC; with S3/Azure you can scale up
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi
  service:
    type: ClusterIP
    port: 80
  # PersistentVolume for uploaded photos — only used when storage.driver=local
  # (mounted at /data, photos in /data/uploads). Set enabled: false for S3/Azure.
  uploads:
    enabled: true
    size: 1Gi
    storageClass: ""
    accessMode: ReadWriteOnce

# ServiceAccount for the web pods. Use annotations for cloud identity instead of
# static keys: EKS IRSA (eks.amazonaws.com/role-arn) or AKS Workload Identity
# (azure.workload.identity/client-id, plus podLabels: azure.workload.identity/use: "true").
serviceAccount:
  create: false
  name: ""
  annotations: {}
  podLabels: {}

# Where profile photos are stored: local | s3 | azure.
storage:
  driver: local
  s3:
    bucket: ""
    region: ""
    endpoint: ""          # set for S3-compatible (MinIO); leave empty for AWS
    forcePathStyle: false
    prefix: ""            # optional key prefix, e.g. "photos"
    publicBaseUrl: ""     # optional CDN/CloudFront base for returned URLs
    acl: ""               # e.g. "public-read" if your bucket allows ACLs
    # Leave keys empty to use IRSA / instance role (recommended on EKS).
    accessKeyId: ""
    secretAccessKey: ""
  azure:
    connectionString: ""  # easiest; or set account + accountKey below
    account: ""
    accountKey: ""
    container: ""
    publicBaseUrl: ""     # optional CDN base; defaults to the blob URL

# Application configuration & secrets. For production, override these with
# `--set` / a values file, or point `existingSecret` at a pre-created Secret.
app:
  # If set, the chart uses this Secret instead of creating one from the values below.
  existingSecret: ""
  jwtSecret: "change-me-please"            # signs admin sessions
  adminEmail: "admin@example.com"          # seeded on first migrate
  adminPassword: "change-me-please"        # seeded on first migrate (rotate by changing this)
  requestApiKey: ""                        # x-api-key for external apps calling request-testimonial
  publicSiteUrl: "https://wall.example.com" # used to build submission links; match your ingress host
  tokenTtlDays: 14
  # Optional SMTP for emailing invite links. Leave smtp.host empty to disable
  # email (the admin "Generate link" still works and returns the link).
  smtp:
    host: ""
    port: 587
    secure: false
    user: ""
    password: ""
    from: "Wall of Fame <noreply@example.com>"

postgres:
  enabled: true # set false to use an external/managed Postgres via app.databaseUrl
  image: postgres:16-alpine
  database: wallofsuccess
  username: wall
  password: "change-me-please"
  service:
    port: 5432
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi

# When postgres.enabled is false, set the full connection string here.
externalDatabaseUrl: ""

ingress:
  enabled: true
  className: nginx
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # nginx.ingress.kubernetes.io/proxy-body-size: "6m"
  host: wall.example.com
  path: /
  pathType: Prefix
  tls:
    enabled: false
    secretName: wallofsuccess-tls
